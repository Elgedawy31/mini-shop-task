services:
  dashboard:
    build:
      context: ./dashboard
      target: development
    command: bun dev --host 0.0.0.0
    ports:
      - "5000:5000"
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      target: development
    command: bun dev
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 4000
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dashboard_node_modules:
  backend_node_modules:
