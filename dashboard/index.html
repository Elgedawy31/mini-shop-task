    <title>Mini Shop Admin</title>
    <meta
      name="description"
      content="Admin dashboard for the Mini Shop — manage products, orders, and store analytics."
    />

    <script>
      // Prevent flash of incorrect theme by setting dark class early
      const storedTheme = localStorage.getItem("atomix-ui-theme");

      if (storedTheme === "dark" || !storedTheme) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>

    <div id="root"></div>
