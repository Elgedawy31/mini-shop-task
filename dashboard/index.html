<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml+png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect to Google Fonts for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>New Dashboard</title>
    <meta
      name="description"
      content="A scalable, production-ready frontend architecture built with Vite, React, TypeScript, and Tailwind CSS"
    />

    <script>
      // Prevent flash of incorrect theme by setting dark class early
      if (
        localStorage.getItem("new-dashboard-ui-theme") === "dark" ||
        (!localStorage.getItem("new-dashboard-ui-theme") &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
