<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232563eb'/%3E%3Cpath fill='white' d='M8 12h16v2H8zm0 5h10v2H8zm0 5h14v2H8z'/%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Mini Shop Admin</title>
    <meta
      name="description"
      content="Admin dashboard for the Mini Shop — manage products, orders, and store analytics."
    />

    <script>
      // Prevent flash of incorrect theme by setting dark class early
      if (
        localStorage.getItem("new-dashboard-ui-theme") === "dark" ||
        (!localStorage.getItem("new-dashboard-ui-theme") &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
